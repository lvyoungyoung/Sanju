name: Backend Functions

on:
  pull_request:
    paths:
      - "supabase/functions/**"
      - "scripts/edge-functions.txt"
      - "scripts/check-edge-functions.sh"
      - "scripts/deploy-edge-functions.sh"
      - ".github/workflows/backend-functions.yml"
  push:
    branches:
      - main
    paths:
      - "supabase/functions/**"
      - "scripts/edge-functions.txt"
      - "scripts/check-edge-functions.sh"
      - "scripts/deploy-edge-functions.sh"
      - ".github/workflows/backend-functions.yml"
  workflow_dispatch:
    inputs:
      function_name:
        description: "Edge Function to deploy"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - cleanup-guest-generation-jobs
          - confirm-purchase
          - delete-account
          - generate-memory-v2
          - migrate-guest-credits
          - moderate-image-v1
          - recover-guest-generation

jobs:
  check:
    name: Check Edge Functions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check functions
        run: bash scripts/check-edge-functions.sh

  deploy:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install Aliyun Supabase functions-cli
        run: |
          curl -L https://help-static-aliyun-doc.aliyuncs.com/file-manage-files/zh-CN/20260319/yaruon/functions-cli-linux-amd64-2026-03-17 -o /tmp/functions-cli
          chmod +x /tmp/functions-cli
          file /tmp/functions-cli

      - name: Deploy selected function
        env:
          FUNCTIONS_CLI_BIN: /tmp/functions-cli
          SUPABASE_API_URL: ${{ secrets.SUPABASE_API_URL }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
        run: bash scripts/deploy-edge-functions.sh "${{ inputs.function_name }}"
