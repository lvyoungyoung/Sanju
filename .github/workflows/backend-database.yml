name: Backend Database

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - "scripts/supabase-db-migrations.sh"
      - ".github/workflows/backend-database.yml"
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - "scripts/supabase-db-migrations.sh"
      - ".github/workflows/backend-database.yml"
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      mode:
        description: "Migration mode"
        required: true
        default: "status"
        type: choice
        options:
          - status
          - baseline
          - apply

jobs:
  check:
    name: Check Migration Runner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check migration script syntax
        run: bash -n scripts/supabase-db-migrations.sh

  migrate:
    name: SQL Migrations
    runs-on: [self-hosted, linux, x64, aliyun-ecs]
    needs: check
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    environment: ${{ inputs.target_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.75.0

      - name: Run SQL migrations
        env:
          TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
          EXPECTED_SUPABASE_PROJECT_ID: ${{ inputs.target_environment == 'staging' && 'spb-bp1364k407p37qn7' || 'spb-bp103246ivn7q0nl' }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID || secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_USER: ${{ vars.SUPABASE_DB_USER || 'postgres' }}
          SUPABASE_DB_NAME: ${{ vars.SUPABASE_DB_NAME || 'postgres' }}
          SUPABASE_DB_PORT: ${{ vars.SUPABASE_DB_PORT || '5432' }}
        run: bash scripts/supabase-db-migrations.sh "${{ inputs.mode }}"
