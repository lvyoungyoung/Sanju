name: Backend Database

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - "scripts/supabase-db-migrations.sh"
      - ".github/workflows/backend-database.yml"
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - "scripts/supabase-db-migrations.sh"
      - ".github/workflows/backend-database.yml"
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      mode:
        description: "Migration mode"
        required: true
        default: "status"
        type: choice
        options:
          - status
          - baseline
          - apply

jobs:
  check:
    name: Check Migration Runner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check migration script syntax
        run: bash -n scripts/supabase-db-migrations.sh

  migrate:
    name: SQL Migrations
    runs-on: [self-hosted, linux, x64, aliyun-ecs]
    needs: check
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    environment: ${{ inputs.target_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Aliyun Supabase CLI
        run: |
          curl -L https://help-static-aliyun-doc.aliyuncs.com/file-manage-files/zh-CN/20260422/lptmes/supabase_v1.0.0_linux_amd64.tar.gz -o /tmp/aliyun-supabase.tar.gz
          mkdir -p /tmp/aliyun-supabase-cli
          tar -xzf /tmp/aliyun-supabase.tar.gz -C /tmp/aliyun-supabase-cli
          chmod +x /tmp/aliyun-supabase-cli/supabase
          /tmp/aliyun-supabase-cli/supabase --help

      - name: Run SQL migrations
        env:
          TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
          EXPECTED_SUPABASE_PROJECT_ID: ${{ inputs.target_environment == 'staging' && 'spb-bp1364k407p37qn7' || 'spb-bp103246ivn7q0nl' }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID || secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          ALIYUN_ACCESS_TOKEN: ${{ secrets.ALIYUN_ACCESS_TOKEN }}
          ALIYUN_REGION_ID: ${{ vars.ALIYUN_REGION_ID || 'cn-hangzhou' }}
          SUPABASE_CLI_BIN: /tmp/aliyun-supabase-cli/supabase
        run: bash scripts/supabase-db-migrations.sh "${{ inputs.mode }}"
